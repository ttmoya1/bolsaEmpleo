<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head('Publicar puesto')}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav    th:replace="~{presentation/fragments :: nav}"></nav>
<main>
    <div class="form w75">
        <form method="POST"
              th:action="@{${editing ? '/empresa/puestos/actualizar' : '/empresa/puestos/crear'}}"
              th:object="${puesto}">

            <input type="hidden" th:field="*{id}"/>

            <div class="section">Datos del puesto</div>
            <div>
                <div class="label">Descripción</div>
                <div class="field">
                    <textarea th:field="*{descripcion}" rows="4" style="width:100%;"></textarea>
                    <span th:if="${#fields.hasErrors('descripcion')}"
                          th:errors="*{descripcion}" class="error"></span>
                </div>
            </div>
            <div>
                <div class="label">Salario (₡)</div>
                <div class="field">
                    <input type="number" step="0.01" th:field="*{salario}"/>
                </div>
            </div>
            <div>
                <div class="label">Tipo de publicación</div>
                <div class="field">
                    <select th:field="*{tipoPublicacion}">
                        <option value="PUB">Público</option>
                        <option value="PRI">Privado</option>
                    </select>
                </div>
            </div>

            <div class="section">Características requeridas</div>
            <table>
                <thead>
                <tr>
                    <th>Ruta</th>
                    <th>Característica</th>
                    <th>Requerida</th>
                    <th>Nivel requerido</th>
                </tr>
                </thead>
                <tbody>
                <!--
                    'caracteristicasDisponibles' son solo las hojas (sin hijos).
                    La ruta muestra la cadena de padres para identificar el contexto.
                -->
                <tr th:each="c : ${caracteristicasDisponibles}">
                    <!-- Ruta de ancestros -->
                    <td style="color:#555; font-size:13px;">
                        <span th:if="${c.padre != null and c.padre.padre != null}"
                              th:text="${c.padre.padre.nombre} + ' › '"></span>
                        <span th:if="${c.padre != null}"
                              th:text="${c.padre.nombre}"></span>
                        <span th:if="${c.padre == null}">—</span>
                    </td>

                    <!-- Nombre de la hoja -->
                    <td>
                        <label>
                            <input type="checkbox"
                                   name="caracIds"
                                   th:value="${c.id}"
                                   th:checked="${requeridas != null and requeridas.?[caracteristica.id == __${c.id}__].size() > 0}"/>
                            <span th:text="${c.nombre}"></span>
                        </label>
                    </td>

                    <!-- Nivel -->
                    <td>
                        <select name="niveles">
                            <option value="1"
                                    th:selected="${requeridas != null and requeridas.?[caracteristica.id == __${c.id}__ and nivelDeseado == 1].size() > 0}">
                                Básico
                            </option>
                            <option value="2"
                                    th:selected="${requeridas != null and requeridas.?[caracteristica.id == __${c.id}__ and nivelDeseado == 2].size() > 0}">
                                Intermedio
                            </option>
                            <option value="3"
                                    th:selected="${requeridas != null and requeridas.?[caracteristica.id == __${c.id}__ and nivelDeseado == 3].size() > 0}">
                                Avanzado
                            </option>
                        </select>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="section">
                <input type="submit" value="Guardar" class="button"/>
            </div>
        </form>
    </div>
    <a th:href="@{/empresa/dashboard}" class="button">Regresar</a>
</main>
<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
