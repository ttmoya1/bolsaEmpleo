<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head('Detalle candidato')}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav    th:replace="~{presentation/fragments :: nav}"></nav>
<main>
    <div class="form w50">
        <div class="section">Datos del candidato</div>
        <div><div class="label">Nombre</div>
            <div class="field" th:text="${oferente.nombre + ' ' + oferente.primerApellido}"></div></div>
        <div><div class="label">Identificación</div>
            <div class="field" th:text="${oferente.identificacion}"></div></div>
        <div><div class="label">Nacionalidad</div>
            <div class="field" th:text="${oferente.nacionalidad}"></div></div>
        <div><div class="label">Teléfono</div>
            <div class="field" th:text="${oferente.telefono}"></div></div>
        <div><div class="label">Residencia</div>
            <div class="field" th:text="${oferente.lugarResidencia}"></div></div>
        <div><div class="label">Correo</div>
            <div class="field" th:text="${oferente.usuario.correo}"></div></div>
        <div th:if="${oferente.curriculumPdf != null}">
            <div class="label">Currículo</div>
            <div class="field">
                <a th:href="${oferente.curriculumPdf}" target="_blank" class="button">Ver PDF</a>
            </div>
        </div>
    </div>

    <h3>Habilidades</h3>
    <table th:if="${!#lists.isEmpty(habilidades)}">
        <thead>
        <tr><th>Categoría</th><th>Habilidad</th><th>Nivel</th></tr>
        </thead>
        <tbody>
        <tr th:each="h : ${habilidades}">
            <td th:text="${h.caracteristica.padre != null ? h.caracteristica.padre.nombre : '-'}"></td>
            <td th:text="${h.caracteristica.nombre}"></td>
            <td th:switch="${h.nivel}">
                <span th:case="1">Básico</span>
                <span th:case="2">Intermedio</span>
                <span th:case="3">Avanzado</span>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(habilidades)}" class="sin-resultados">Sin habilidades registradas.</p>


    <a th:href="${urlRegresar}" class="button">Regresar</a>
</main>
<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
