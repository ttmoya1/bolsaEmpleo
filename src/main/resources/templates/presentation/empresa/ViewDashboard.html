<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head('Mi empresa')}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav    th:replace="~{presentation/fragments :: nav}"></nav>
<main>
    <h2>Panel de empresa</h2>
    <div class="form w50">
        <div class="section">Mi empresa</div>
        <div><div class="label">Nombre</div>
            <div class="field" th:text="${empresa.nombre}"></div></div>
        <div><div class="label">Localización</div>
            <div class="field" th:text="${empresa.localizacion}"></div></div>
        <div><div class="label">Teléfono</div>
            <div class="field" th:text="${empresa.telefono}"></div></div>
        <div><div class="label">Estado</div>
            <div class="field">
                <span th:if="${empresa.aprobada}" style="color:green;">Aprobada</span>
                <span th:unless="${empresa.aprobada}" style="color:orange;">Pendiente de aprobación</span>
            </div>
        </div>
        <div class="section">Acciones</div>
        <div class="field">
            <a th:href="@{/empresa/puestos}" class="button">Ver mis puestos</a>
            <a th:href="@{/empresa/puestos/nuevo}" class="button">Publicar nuevo puesto</a>
        </div>
    </div>
</main>
<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
