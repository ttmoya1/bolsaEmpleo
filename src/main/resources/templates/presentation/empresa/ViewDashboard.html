<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head('Mi empresa')}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav    th:replace="~{presentation/fragments :: nav}"></nav>
<main>
    <h2>Panel de empresa</h2>
    <div class="form w50">
        <div class="section">Mi empresa</div>
        <div><div class="label">Nombre</div>
            <div class="field" th:text="${empresa.nombre}"></div></div>
        <div><div class="label">Localización</div>
            <div class="field" th:text="${empresa.localizacion}"></div></div>
        <div><div class="label">Teléfono</div>
            <div class="field" th:text="${empresa.telefono}"></div></div>
        <div><div class="label">Estado</div>
            <div class="field">
                <span th:if="${empresa.aprobada}" style="color:green;">Aprobada</span>
                <span th:unless="${empresa.aprobada}" style="color:orange;">Pendiente de aprobación</span>
            </div>
        </div>
    </div>

    <h3>Mis puestos</h3>
    <a th:href="@{/empresa/puestos/nuevo}" class="button">Publicar nuevo puesto</a>
    <table th:if="${!#lists.isEmpty(puestos)}">
        <thead>
        <tr><th>Descripción</th><th>Salario</th><th>Tipo</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody>
        <tr th:each="p : ${puestos}">
            <td th:text="${p.descripcion.length() > 60 ? p.descripcion.substring(0,60)+'...' : p.descripcion}"></td>
            <td th:text="${p.salario != null ? '₡'+#numbers.formatDecimal(p.salario,1,'COMMA',0,'POINT') : '-'}"></td>
            <td th:text="${p.tipoPublicacion == 'PUB' ? 'Público' : 'Privado'}"></td>
            <td th:text="${p.activo ? 'Activo' : 'Inactivo'}"></td>
            <td>
                <a th:href="@{/empresa/puestos/editar/{id}(id=${p.id})}" class="button">Editar</a>
                <a th:href="@{/empresa/puestos/{id}/candidatos(id=${p.id})}" class="button">Candidatos</a>
                <a th:if="${p.activo}"
                   th:href="@{/empresa/puestos/desactivar/{id}(id=${p.id})}"
                   class="delete">Desactivar</a>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(puestos)}" class="sin-resultados">No tiene puestos publicados.</p>
</main>
<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
