<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head('Mis puestos')}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav    th:replace="~{presentation/fragments :: nav}"></nav>
<main>
    <h2>Mis puestos</h2>

    <a th:href="@{/empresa/puestos/nuevo}" class="button">Publicar nuevo puesto</a>

    <table th:if="${!#lists.isEmpty(puestos)}">
        <thead>
        <tr><th>Descripción</th><th>Salario</th><th>Tipo</th><th>Estado</th><th>Fecha</th><th>Acciones</th></tr>
        </thead>
        <tbody>
        <tr th:each="p : ${puestos}">
            <td th:text="${p.descripcion.length() > 60
                           ? p.descripcion.substring(0,60)+'...'
                           : p.descripcion}"></td>
            <td th:text="${p.salario != null
                           ? '₡ '+#numbers.formatDecimal(p.salario,1,'COMMA',0,'POINT')
                           : 'No indicado'}"></td>
            <td th:text="${p.tipoPublicacion == 'PUB' ? 'Público' : 'Privado'}"></td>
            <td>
                <span th:if="${p.activo}"  style="color:green;">Activo</span>
                <span th:unless="${p.activo}" style="color:gray;">Inactivo</span>
            </td>
            <td th:text="${#temporals.format(p.fechaRegistro,'dd/MM/yyyy')}"></td>
            <td>
                <a th:href="@{/empresa/puestos/editar/{id}(id=${p.id})}" class="button">Editar</a>
                <a th:href="@{/empresa/puestos/{id}/candidatos(id=${p.id})}" class="button">Candidatos</a>
                <a th:if="${p.activo}"
                   th:href="@{/empresa/puestos/desactivar/{id}(id=${p.id})}"
                   class="delete">Desactivar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(puestos)}" class="sin-resultados">
        No tiene puestos publicados aún.
    </p>

    <a th:href="@{/empresa/dashboard}" class="button">Regresar</a>
</main>
<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
