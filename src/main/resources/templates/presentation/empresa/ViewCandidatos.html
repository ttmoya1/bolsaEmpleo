<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head('Candidatos')}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav    th:replace="~{presentation/fragments :: nav}"></nav>
<main>
    <h2>Candidatos para: <span th:text="${puesto.descripcion.length() > 60
        ? puesto.descripcion.substring(0,60)+'...' : puesto.descripcion}"></span></h2>

    <!-- Filtro de coincidencias mínimas -->
    <div class="form w25">
        <form method="GET" th:action="@{/empresa/puestos/{id}/candidatos(id=${puesto.id})}">
            <div class="section">Filtrar por coincidencias</div>
            <div>
                <div class="label">Mínimo</div>
                <div class="field">
                    <input type="number" name="minCoincidencias"
                           th:value="${minCoincidencias}" min="1"
                           th:max="${totalRequisitos}"/>
                    <span>de <span th:text="${totalRequisitos}"></span></span>
                    <input type="submit" value="Filtrar" class="button"/>
                </div>
            </div>
        </form>
    </div>

    <table th:if="${!#lists.isEmpty(resultados)}">
        <thead>
        <tr>
            <th>Nombre</th><th>Identificación</th>
            <th>Residencia</th><th>Coincidencias</th><th>Detalle</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="fila : ${resultados}">
            <td th:text="${fila[0].nombre + ' ' + fila[0].primerApellido}"></td>
            <td th:text="${fila[0].identificacion}"></td>
            <td th:text="${fila[0].lugarResidencia}"></td>
            <td th:text="${fila[1] + ' / ' + totalRequisitos}"></td>
            <td>
                <a th:href="@{/empresa/candidato/{id}(id=${fila[0].id})}" class="button">Ver</a>
            </td>
        </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(resultados)}" class="sin-resultados">
        No se encontraron candidatos con ese nivel de coincidencia.
    </p>

    <a th:href="@{/empresa/dashboard}" class="button">Regresar</a>
</main>
<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
