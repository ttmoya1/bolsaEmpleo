<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head('Registro de empresa')}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav    th:replace="~{presentation/fragments :: nav}"></nav>
<main>
    <div class="form w50">
        <form method="POST" action="/registro/empresa"
              th:object="${empresa}">
            <div class="section">Datos de acceso</div>
            <div>
                <div class="label">Correo</div>
                <div class="field">
                    <input type="email" th:field="*{usuario.correo}"/>
                    <span th:if="${#fields.hasErrors('usuario.correo')}"
                          th:errors="*{usuario.correo}" class="error"></span>
                </div>
            </div>
            <div>
                <div class="label">Clave</div>
                <div class="field">
                    <input type="password" th:field="*{usuario.clave}"/>
                    <span th:if="${#fields.hasErrors('usuario.clave')}"
                          th:errors="*{usuario.clave}" class="error"></span>
                </div>
            </div>

            <div class="section">Datos de la empresa</div>
            <div>
                <div class="label">Nombre</div>
                <div class="field">
                    <input type="text" th:field="*{nombre}"/>
                    <span th:if="${#fields.hasErrors('nombre')}"
                          th:errors="*{nombre}" class="error"></span>
                </div>
            </div>
            <div>
                <div class="label">Localización</div>
                <div class="field">
                    <input type="text" th:field="*{localizacion}"/>
                </div>
            </div>
            <div>
                <div class="label">Teléfono</div>
                <div class="field">
                    <input type="text" th:field="*{telefono}"/>
                </div>
            </div>
            <div>
                <div class="label">Descripción</div>
                <div class="field">
                    <textarea th:field="*{descripcion}" rows="3"></textarea>
                </div>
            </div>
            <div class="section">
                <input type="submit" value="Registrarse" class="button"/>
            </div>
        </form>
    </div>
    <a th:href="@{/login}" class="button">¿Ya tiene cuenta? Ingrese aquí</a>
</main>
<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
