<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragments :: head('Características')}"></head>
<body>
<header th:replace="~{presentation/fragments :: header}"></header>
<nav    th:replace="~{presentation/fragments :: nav}"></nav>
<main style="align-items:stretch;">

    <h2 style="width:95%;">Características del sistema</h2>

    <div style="display:flex; gap:12px; width:95%; align-items:flex-start;">


        <div style="flex:1; background:#f2f2f2; border:1px solid #ccc;
                    border-radius:8px; overflow:hidden;">


            <div style="background:#e0e8f0; padding:7px 12px; font-size:12px;
                        border-bottom:1px solid #ccc; display:flex; flex-wrap:wrap;
                        align-items:center; gap:4px; min-height:34px;">

                <a href="/admin/caracteristicas"
                   style="color:#2c5f8a; font-weight:bold; text-decoration:none;">
                    Raíz
                </a>

                <th:block th:each="nodo : ${ruta}">
                    <span style="color:#999; padding:0 2px;">›</span>
                    <a th:href="@{/admin/caracteristicas(nodoId=${nodo.id})}"
                       style="color:#2c5f8a; text-decoration:none;">
                        <span th:text="${nodo.nombre}"></span>
                    </a>
                </th:block>
            </div>


            <div style="padding:10px; min-height:220px;">

                <div th:if="${#lists.isEmpty(hijos)}"
                     class="sin-resultados" style="padding:16px 0; text-align:center;">
                    No hay subcategorías en este nivel.
                </div>


                <div th:each="hijo : ${hijos}" th:if="${!hijo.hijos.isEmpty()}">
                    <div style="display:flex; align-items:center; justify-content:space-between;
                                padding:7px 10px; border-radius:6px; margin-bottom:3px;
                                background:white; border:1px solid #ddd;">
                        <a th:href="@{/admin/caracteristicas(nodoId=${hijo.id})}"
                           style="color:#1a3d5c; text-decoration:none; font-size:14px; flex:1;">
                            <span th:text="${hijo.nombre}"></span>
                            <span style="color:#999; font-size:12px; margin-left:6px;">›</span>
                        </a>
                        <!-- SIN JS: enlace a página de confirmación intermedia -->
                        <a th:href="@{/admin/caracteristicas/confirmar-eliminar/{id}(id=${hijo.id}, nodoId=${nodoId})}"
                           style="color:#c0392b; font-size:18px; text-decoration:none;
                                  padding:0 6px; line-height:1; flex-shrink:0;">×</a>
                    </div>
                </div>

                <!-- Nodos hoja -->
                <div th:each="hijo : ${hijos}" th:if="${hijo.hijos.isEmpty()}">
                    <div style="display:flex; align-items:center; justify-content:space-between;
                                padding:7px 10px; border-radius:6px; margin-bottom:3px;
                                background:#e8f0f7; border:1px solid #2c5f8a;">
                        <span th:text="${hijo.nombre}"
                              style="color:#1a3d5c; font-size:14px; flex:1;"></span>
                        <!-- SIN JS: enlace a página de confirmación intermedia -->
                        <a th:href="@{/admin/caracteristicas/confirmar-eliminar/{id}(id=${hijo.id}, nodoId=${nodoId})}"
                           style="color:#c0392b; font-size:18px; text-decoration:none;
                                  padding:0 6px; line-height:1; flex-shrink:0;">×</a>
                    </div>
                </div>
            </div>
        </div>


        <div style="width:260px; flex-shrink:0; background:#f2f2f2;
                    border:1px solid #ccc; border-radius:8px; overflow:hidden;">

            <div class="section" style="margin:0; border-radius:0;">
                Agregar característica
            </div>

            <div style="padding:12px; min-height:220px;">
                <form method="POST" action="/admin/caracteristicas/guardar">

                    <input type="hidden" name="nodoId" th:value="${nodoId}"/>

                    <div style="margin-bottom:10px;">
                        <div style="font-size:12px; color:#555; margin-bottom:4px;">Nombre</div>
                        <input type="text" name="nombre" required
                               placeholder="Ej: React, Inglés..."
                               style="width:100%; box-sizing:border-box; font-size:13px;"/>
                    </div>

                    <div style="margin-bottom:12px;">
                        <div style="font-size:12px; color:#555; margin-bottom:4px;">Categoría padre</div>
                        <select name="padreId" style="width:100%; font-size:13px;">
                            <option th:value="${nodoId != null ? nodoId : 0}"
                                    th:text="${nodoPadre != null ? nodoPadre.nombre : '── Ninguno (raíz) ──'}">
                            </option>
                            <option th:each="hijo : ${hijos}"
                                    th:value="${hijo.id}"
                                    th:text="${'  › ' + hijo.nombre}">
                            </option>
                        </select>
                    </div>

                    <input type="submit" value="Guardar característica" class="button"
                           style="width:100%;"/>
                </form>
            </div>
        </div>

    </div>

    <div style="margin-top:16px; width:95%;">
        <a th:href="@{/admin/dashboard}" class="button">Regresar al panel</a>
    </div>

</main>
<footer th:replace="~{presentation/fragments :: footer}"></footer>
</body>
</html>
